name: Rebuild Webpage Layout Only

on:
  workflow_dispatch: # Gives you a manual trigger button

permissions:
  contents: write

jobs:
  build-only:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas

    - name: Compile Static Website Layout
      run: python build_site.py

    - name: Commit and Push Website Update
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add docs/
        if git diff --staged --quiet; then
          echo "No layout changes detected."
        else
          git commit -m "Manual layout update [skip ci]"
          git push
        fi
